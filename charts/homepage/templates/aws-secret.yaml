{{- if .Values.config.s3.createSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.config.s3.secretName }}
type: Opaque
data:
  AWS_ACCESS_KEY_ID: {{ .Values.config.s3.accessKeyId | b64enc | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.config.s3.secretAccessKey | b64enc | quote }}
  AWS_REGION: {{ .Values.config.s3.region | b64enc | quote }}
  AWS_S3_PATH: {{ .Values.config.s3.s3Path | b64enc | quote }}
{{- end }}
