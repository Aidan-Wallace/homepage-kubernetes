apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "homepage.fullname" . }}
data:
{{- range $name, $content := .Values.configFiles }}
  {{ $name }}: |
{{ $content | nindent 4 }}
{{- end }}

{{- range $name, $content := .Values.extraFiles }}
  {{ $name }}: |
{{ $content | nindent 4 }}
{{- end }}
