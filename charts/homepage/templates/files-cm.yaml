apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "homepage.fullname" . }}
data:
{{- if eq .Values.config.provider "configMap" }}
{{- range $name, $content := .Values.config.configMap }}
  {{ $name }}: |
{{ $content | nindent 4 }}
{{- end }}
{{- end }}
{{- range $name, $content := .Values.config.extraFiles }}
  {{ $name }}: |
{{ $content | nindent 4 }}
{{- end }}
